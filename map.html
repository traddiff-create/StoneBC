<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Bicycle Coalition — Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #58a050;
    }

    .route-count {
      font-size: 12px;
      color: #8b949e;
      border-left: 1px solid #30363d;
      padding-left: 16px;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: transparent;
      color: #8b949e;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .filter-btn.active { color: #fff; border-color: transparent; }
    .filter-btn.active[data-cat="all"]     { background: #58a050; }
    .filter-btn.active[data-cat="trail"]   { background: #2ea043; }
    .filter-btn.active[data-cat="gravel"]  { background: #d29922; }
    .filter-btn.active[data-cat="road"]    { background: #1f6feb; }
    .filter-btn.active[data-cat="fatbike"] { background: #8957e5; }

    #map-container {
      position: relative;
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map { flex: 1; }

    #sidebar {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: rgba(22, 27, 34, 0.95);
      backdrop-filter: blur(12px);
      border-left: 1px solid #30363d;
      z-index: 500;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      pointer-events: none;
    }

    #sidebar.open {
      transform: translateX(0);
      pointer-events: all;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .sidebar-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .sidebar-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      color: #e6edf3;
    }

    .new-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: #1f6feb;
      color: #fff;
      padding: 2px 7px;
      border-radius: 8px;
    }

    .sidebar-close {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      flex-shrink: 0;
    }

    .sidebar-close:hover { color: #e6edf3; }

    .sidebar-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .tag-trail   { background: #1a4731; color: #2ea043; }
    .tag-gravel  { background: #3d2c00; color: #d29922; }
    .tag-road    { background: #0a2140; color: #58a6ff; }
    .tag-fatbike { background: #2d1f6b; color: #a371f7; }
    .tag-easy    { background: #1a4731; color: #56d364; }
    .tag-moderate{ background: #3d2c00; color: #e3b341; }
    .tag-hard    { background: #3d1f00; color: #f0883e; }
    .tag-expert  { background: #3d0a0a; color: #f85149; }

    .sidebar-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #30363d;
      margin: 12px 16px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
    }

    .stat { background: #0d1117; padding: 12px 14px; }

    .stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 4px;
    }

    .stat-value { font-size: 18px; font-weight: 700; color: #e6edf3; }
    .stat-unit  { font-size: 11px; color: #8b949e; margin-left: 2px; }

    .sidebar-desc { padding: 0 16px 16px; font-size: 13px; color: #8b949e; line-height: 1.6; }
    .region-pill {
      display: inline-block;
      font-size: 10px;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1px 8px;
      margin-bottom: 8px;
    }

    .legend {
      position: absolute;
      bottom: 24px;
      left: 12px;
      z-index: 500;
      background: rgba(22, 27, 34, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
    }

    .legend-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 11px;
      color: #c9d1d9;
    }

    .legend-line { width: 24px; height: 3px; border-radius: 2px; }

    .leaflet-container { background: #0d1117; }
    .leaflet-control-zoom { border: 1px solid #30363d !important; border-radius: 6px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: #161b22 !important; color: #8b949e !important; border-bottom: 1px solid #30363d !important; }
    .leaflet-control-zoom a:hover { background: #21262d !important; color: #e6edf3 !important; }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      z-index: 9999;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a050;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: #8b949e; }
  </style>
</head>
<body>

<header>
  <div class="logo">Stone Bicycle Coalition</div>
  <div class="route-count" id="route-count">Loading routes…</div>
  <div class="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="trail">Trail</button>
    <button class="filter-btn" data-cat="gravel">Gravel</button>
    <button class="filter-btn" data-cat="road">Road</button>
    <button class="filter-btn" data-cat="fatbike">Fat Bike</button>
  </div>
</header>

<div id="map-container">
  <div id="map"></div>

  <div id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-name-row">
          <div class="sidebar-name" id="s-name"></div>
          <div class="new-badge" id="s-new-badge" style="display:none">New</div>
        </div>
        <div class="sidebar-tags" id="s-tags"></div>
      </div>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close">✕</button>
    </div>
    <div class="sidebar-stats">
      <div class="stat">
        <div class="stat-label">Distance</div>
        <div class="stat-value"><span id="s-dist"></span><span class="stat-unit">mi</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Elevation Gain</div>
        <div class="stat-value"><span id="s-elev"></span><span class="stat-unit">ft</span></div>
      </div>
    </div>
    <div class="sidebar-desc">
      <div class="region-pill" id="s-region"></div>
      <p id="s-desc"></p>
    </div>
  </div>

  <div class="legend">
    <div class="legend-title">Route Type</div>
    <div class="legend-item"><div class="legend-line" style="background:#2ea043"></div><span>Trail</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#d29922"></div><span>Gravel</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#58a6ff"></div><span>Road</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#a371f7"></div><span>Fat Bike</span></div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading 41 routes…</p>
  </div>
</div>

<script>
const NEW_ROUTES = new Set([
  "8-o-7-2024-group",
  "8over7-dirt-v1",
  "black-hills-pay-dirt",
  "dakota-five-o-reverse",
  "great-plains-gravel",
  "pine-island-ponderosa-escapade"
]);

const CATEGORY_COLOR = {
  trail:   "#2ea043",
  gravel:  "#d29922",
  road:    "#58a6ff",
  fatbike: "#a371f7"
};

const map = L.map("map", {
  center: [44.15, -103.65],
  zoom: 9,
  zoomControl: true
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd",
  maxZoom: 19
}).addTo(map);

let allLayers = {};
let activeFilter = "all";

function openSidebar(route) {
  document.getElementById("s-name").textContent = route.name;
  const badge = document.getElementById("s-new-badge");
  badge.style.display = NEW_ROUTES.has(route.id) ? "inline-block" : "none";

  const tagsEl = document.getElementById("s-tags");
  tagsEl.replaceChildren();

  const catTag = document.createElement("span");
  catTag.className = "tag tag-" + (route.category || "gravel");
  catTag.textContent = route.category || "gravel";
  tagsEl.appendChild(catTag);

  const diffTag = document.createElement("span");
  diffTag.className = "tag tag-" + (route.difficulty || "moderate");
  diffTag.textContent = route.difficulty || "moderate";
  tagsEl.appendChild(diffTag);

  document.getElementById("s-dist").textContent = Number(route.distanceMiles).toFixed(1);
  document.getElementById("s-elev").textContent = Number(route.elevationGainFeet).toLocaleString();
  document.getElementById("s-region").textContent = route.region || "";
  document.getElementById("s-desc").textContent = route.description || "";
  document.getElementById("sidebar").classList.add("open");
}

document.getElementById("sidebar-close").addEventListener("click", () => {
  document.getElementById("sidebar").classList.remove("open");
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    Object.values(allLayers).forEach(({ layer, route }) => {
      const show = activeFilter === "all" || route.category === activeFilter;
      if (show) map.addLayer(layer);
      else map.removeLayer(layer);
    });
  });
});

fetch("StoneBC/routes.json")
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(routes => {
    document.getElementById("loading").style.display = "none";

    const newCount = routes.filter(r => NEW_ROUTES.has(r.id)).length;
    const countEl = document.getElementById("route-count");
    countEl.textContent = routes.length + " routes · " + newCount + " new this import";

    routes.forEach(route => {
      const coords = (route.trackpoints || []).map(pt => [pt[0], pt[1]]);
      if (coords.length < 2) return;

      const color = CATEGORY_COLOR[route.category] || "#8b949e";
      const isNew = NEW_ROUTES.has(route.id);

      const line = L.polyline(coords, {
        color,
        weight:    isNew ? 3.5 : 2.5,
        opacity:   isNew ? 1.0 : 0.75,
        smoothFactor: 1
      });

      line.on("click", () => openSidebar(route));
      line.on("mouseover", function() { this.setStyle({ weight: 5, opacity: 1 }); });
      line.on("mouseout",  function() {
        this.setStyle({ weight: isNew ? 3.5 : 2.5, opacity: isNew ? 1.0 : 0.75 });
      });
      line.bindTooltip(route.name, { sticky: true, direction: "top" });
      line.addTo(map);

      if (isNew && coords.length > 0) {
        const marker = L.circleMarker(coords[0], {
          radius: 5,
          fillColor: color,
          color: "#fff",
          weight: 1.5,
          fillOpacity: 1
        });
        marker.on("click", () => openSidebar(route));
        marker.addTo(map);
      }

      allLayers[route.id] = { layer: line, route };
    });
  })
  .catch(err => {
    const loading = document.getElementById("loading");
    loading.style.display = "flex";

    const errP = document.createElement("p");
    errP.style.color = "#f85149";
    errP.textContent = "Failed to load routes.json: " + err.message;

    const hintP = document.createElement("p");
    hintP.style.cssText = "color:#8b949e;font-size:12px;margin-top:8px;text-align:center";
    hintP.textContent = "Serve locally: cd /Applications/Apps/StoneBC && python3 -m http.server 8080";

    loading.replaceChildren(document.querySelector(".spinner"), errP, hintP);
  });
</script>
</body>
</html>

name: Android Maestro UI tests

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-maestro.yml"

jobs:
  maestro:
    name: Maestro flows on emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute to gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          working-directory: android
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            for p in ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION ACTIVITY_RECOGNITION POST_NOTIFICATIONS CAMERA RECORD_AUDIO; do
              adb shell pm grant com.stonebicyclecoalition.stonebc "android.permission.$p" || true
            done
            adb shell pm clear com.stonebicyclecoalition.stonebc
            maestro test .maestro/

      - name: Upload Maestro debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-output
          path: |
            ~/.maestro/tests/**/*
          if-no-files-found: warn
          retention-days: 14

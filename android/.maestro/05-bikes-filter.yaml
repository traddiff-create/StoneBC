appId: com.stonebicyclecoalition.stonebc
name: Bikes tab — empty inventory state
---
- launchApp
- runFlow: subflows/skip-onboarding.yaml
- tapOn:
    text: "Bikes"
    index: 1
- assertVisible: "The Quarry"
- assertVisible: "Bikes looking for riders"
- assertVisible: "STATUS"
- assertVisible: "TYPE"
- assertVisible: "No bikes match those filters."

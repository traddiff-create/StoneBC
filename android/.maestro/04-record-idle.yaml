appId: com.stonebicyclecoalition.stonebc
name: Record tab idle state — START button + empty history
---
- launchApp
- runFlow: subflows/skip-onboarding.yaml
- tapOn:
    text: "Record"
    index: 1
- assertVisible: "START"
- assertVisible: "RIDE"
- assertVisible: "RECORDING MODE"
- assertVisible: "Free Ride"
- assertVisible: "Follow Route"
- assertVisible: "Scout Route"
- assertVisible: "MY RIDES"

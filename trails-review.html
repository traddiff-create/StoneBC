<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoneBC — Trail Catalog Review</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #ffffff; color: #111111; }

  header { background: #ffffff; border-bottom: 2px solid #111111; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 22px; font-weight: 700; color: #111111; }
  header p { font-size: 13px; color: #686868; margin-top: 2px; }
  .logo { width: 40px; height: 40px; background: #FFEE58; border: 2px solid #111; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

  .stats-bar { background: #fbfaf3; border-bottom: 1px solid #e0e0e0; padding: 12px 32px; display: flex; gap: 32px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-num { font-size: 24px; font-weight: 700; color: #111111; }
  .stat-label { font-size: 11px; color: #686868; text-transform: uppercase; letter-spacing: 0.5px; }

  .controls { padding: 16px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ccc; background: #ffffff; color: #111111; font-size: 13px; font-family: 'Manrope', sans-serif; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #111; background: #f0f0f0; }
  .filter-btn.active { background: #FFEE58; border-color: #111; color: #111; box-shadow: 4px 4px 0 #111; }
  .search-box { margin-left: auto; padding: 7px 14px; border-radius: 8px; border: 1px solid #ccc; background: #ffffff; color: #111111; font-size: 13px; font-family: 'Manrope', sans-serif; width: 220px; }
  .search-box::placeholder { color: #999; }

  .section-label { padding: 16px 32px 8px; font-size: 11px; font-weight: 600; color: #111111; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
  .section-label .count { background: #111111; color: #ffffff; border-radius: 10px; padding: 1px 8px; font-size: 11px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; padding: 0 32px 32px; }

  .card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; transition: box-shadow 0.15s, transform 0.15s; position: relative; box-shadow: 4px 4px 0 #111; }
  .card:hover { box-shadow: 6px 6px 0 #111; transform: translate(-1px, -1px); }
  .card.wanted { border-left: 3px solid #FFEE58; }
  .card.have { border-left: 3px solid #111111; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .card-name { font-size: 15px; font-weight: 600; color: #111111; line-height: 1.3; }
  .card-region { font-size: 11px; color: #686868; margin-top: 2px; }

  .badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
  .badge-have { background: #111111; color: #ffffff; }
  .badge-high { background: #111111; color: #FFEE58; }
  .badge-medium { background: #f0f0f0; color: #555555; }
  .badge-low { background: #f5f5f5; color: #888888; }

  .card-meta { display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; }
  .meta-val { font-size: 13px; font-weight: 600; color: #111111; }
  .meta-key { font-size: 10px; color: #686868; text-transform: uppercase; }
  .diff-easy { color: #1a7a45; }
  .diff-moderate { color: #b07800; }
  .diff-hard { color: #c0392b; }
  .diff-mixed { color: #2471a3; }

  .card-desc { font-size: 12px; color: #686868; line-height: 1.5; margin: 6px 0; }
  .gpx-note { font-size: 11px; color: #7a5c00; background: #fffde7; border: 1px solid #e0c800; border-radius: 6px; padding: 6px 10px; margin-top: 8px; }

  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .tag { background: #f5f5f5; border: 1px solid #ccc; color: #555555; font-size: 11px; padding: 2px 7px; border-radius: 4px; }

  .card-links { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .link-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #111; background: #ffffff; color: #111111; text-decoration: none; font-family: 'Manrope', sans-serif; transition: all 0.15s; }
  .link-btn:hover { background: #111111; color: #ffffff; }

  .fav-star { position: absolute; top: 12px; right: 12px; font-size: 16px; }
  .hidden { display: none !important; }
</style>
</head>

let currentFilter = 'all';
let currentSearch = '';

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function txt(tag, text, cls) { const e = el(tag, cls); e.textContent = text; return e; }

function diffClass(d) {
  if (!d) return '';
  if (d.includes('easy')) return 'diff-easy';
  if (d.includes('hard')) return 'diff-hard';
  if (d.includes('mixed')) return 'diff-mixed';
  return 'diff-moderate';
}

function makeBadge(r, isWanted) {
  const b = el('span', 'badge');
  if (!isWanted) { b.className = 'badge badge-have'; b.textContent = '\u2705 GPX'; return b; }
  const p = r.priority || 'low';
  b.className = 'badge badge-' + p;
  b.textContent = (p === 'high' ? '\uD83D\uDD25 ' : '') + p.charAt(0).toUpperCase() + p.slice(1);
  return b;
}

function makeCard(r, isWanted) {
  const card = el('div', 'card ' + (isWanted ? 'wanted' : 'have'));
  card.dataset.region = (r.region || '').toLowerCase();
  card.dataset.name = (r.name || '').toLowerCase();
  card.dataset.tags = (r.tags || []).join(' ').toLowerCase();
  card.dataset.priority = r.priority || '';
  card.dataset.type = isWanted ? 'want' : 'have';

  if ((r.tags || []).includes('favorite')) {
    const star = el('div', 'fav-star');
    star.title = "Rory's favorite";
    star.textContent = '\u2B50';
    card.appendChild(star);
  }

  const top = el('div', 'card-top');
  const nameBlock = el('div');
  nameBlock.appendChild(txt('div', r.name, 'card-name'));
  const regionText = r.region + (r.hub && r.hub !== r.region ? ' \u00B7 ' + r.hub : '');
  nameBlock.appendChild(txt('div', regionText, 'card-region'));
  top.appendChild(nameBlock);
  top.appendChild(makeBadge(r, isWanted));
  card.appendChild(top);

  const meta = el('div', 'card-meta');
  const addMeta = (val, key) => {
    if (!val) return;
    const m = el('div', 'meta-item');
    m.appendChild(txt('span', val, 'meta-val'));
    m.appendChild(txt('span', key, 'meta-key'));
    meta.appendChild(m);
  };
  addMeta(r.distanceMiles ? r.distanceMiles + ' mi' : null, 'Distance');
  addMeta(r.elevationGainFeet ? r.elevationGainFeet.toLocaleString() + ' ft' : null, 'Elevation');
  if (r.difficulty) {
    const m = el('div', 'meta-item');
    const v = txt('span', r.difficulty, 'meta-val ' + diffClass(r.difficulty));
    m.appendChild(v);
    m.appendChild(txt('span', 'Difficulty', 'meta-key'));
    meta.appendChild(m);
  }
  addMeta(r.category || r.type || null, 'Type');
  if (r.multiDay) addMeta('Multi-day', 'Format');
  card.appendChild(meta);

  if (r.description) card.appendChild(txt('div', r.description, 'card-desc'));
  if (r.gpxNote) card.appendChild(txt('div', '\u26A0\uFE0F ' + r.gpxNote, 'gpx-note'));

  if (r.tags && r.tags.length) {
    const tagsEl = el('div', 'tags');
    r.tags.forEach(t => tagsEl.appendChild(txt('span', t, 'tag')));
    card.appendChild(tagsEl);
  }

  const linkSources = [
    [r.trailforksUrl, 'Trailforks'],
    [r.mtbProjectUrl, 'MTBProject'],
    [r.allTrailsUrl, 'AllTrails'],
    [(!r.trailforksUrl && r.gpxSource) ? r.gpxSource : null, 'GPX Source'],
  ];
  const linksEl = el('div', 'card-links');
  linkSources.forEach(([href, label]) => {
    if (!href) return;
    const a = el('a', 'link-btn');
    a.href = href;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = label;
    linksEl.appendChild(a);
  });
  if (linksEl.children.length) card.appendChild(linksEl);

  return card;
}

function applyFilters() {
  const cards = document.querySelectorAll('.card');
  let haveCount = 0, wantCount = 0;
  cards.forEach(card => {
    const name = card.dataset.name;
    const region = card.dataset.region;
    const tags = card.dataset.tags;
    const priority = card.dataset.priority;
    const type = card.dataset.type;

    let show = true;
    if (currentSearch && !name.includes(currentSearch) && !tags.includes(currentSearch) && !region.includes(currentSearch)) show = false;
    if (currentFilter === 'have_gpx' && type !== 'have') show = false;
    if (currentFilter === 'want_gpx' && type !== 'want') show = false;
    if (currentFilter === 'high' && priority !== 'high') show = false;
    if (currentFilter === 'rc' && !region.includes('rapid')) show = false;
    if (currentFilter === 'spearfish' && !region.includes('spearfish')) show = false;
    if (currentFilter === 'bh') {
      const bhRegions = ['black hills','hill city','custer','rochford','nemo','rockerville','piedmont'];
      if (!bhRegions.some(r => region.includes(r))) show = false;
    }

    card.classList.toggle('hidden', !show);
    if (show && type === 'have') haveCount++;
    if (show && type === 'want') wantCount++;
  });

  const haveLabel = document.getElementById('haveSectionLabel');
  const wantLabel = document.getElementById('wantSectionLabel');
  const haveGrid = document.getElementById('haveGrid');
  const wantGrid = document.getElementById('wantGrid');
  const emptyMsg = document.getElementById('emptyMsg');

  haveLabel.classList.toggle('hidden', haveCount === 0);
  haveGrid.classList.toggle('hidden', haveCount === 0);
  wantLabel.classList.toggle('hidden', wantCount === 0);
  wantGrid.classList.toggle('hidden', wantCount === 0);
  emptyMsg.classList.toggle('hidden', haveCount + wantCount > 0);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});
document.getElementById('searchBox').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase();
  applyFilters();
});

// Populate stats
const m = DATA._meta;
document.getElementById('statHave').textContent = m.total_have_gpx;
document.getElementById('statWant').textContent = m.total_want_gpx;
document.getElementById('statHigh').textContent = DATA.wantedRoutes.filter(r => r.priority === 'high').length;
document.getElementById('statRegions').textContent = m.regions.length;
document.getElementById('headerSub').textContent = 'Updated ' + m.updated + ' \u00B7 Review before publishing to site';

const haveLabel = document.getElementById('haveSectionLabel');
const haveCountEl = el('span', 'count'); haveCountEl.textContent = DATA.routes.length;
haveLabel.appendChild(document.createTextNode('Have GPX '));
haveLabel.appendChild(haveCountEl);

const wantLabel = document.getElementById('wantSectionLabel');
const wantCountEl = el('span', 'count'); wantCountEl.textContent = DATA.wantedRoutes.length;
wantLabel.appendChild(document.createTextNode('Need GPX '));
wantLabel.appendChild(wantCountEl);

const haveGrid = document.getElementById('haveGrid');
DATA.routes.forEach(r => haveGrid.appendChild(makeCard(r, false)));

const wantGrid = document.getElementById('wantGrid');
DATA.wantedRoutes.forEach(r => wantGrid.appendChild(makeCard(r, true)));
</script>
</body>

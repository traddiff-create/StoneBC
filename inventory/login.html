<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Stone Bicycle Coalition Inventory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 32px; max-width: 440px; width: 100%; }
h1 { color: #f8fafc; margin: 0 0 8px; font-size: 1.5rem; }
h1 span { color: #60a5fa; }
.subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; line-height: 1.5; }
label { display: block; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
input[type="email"] { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 12px 14px; color: #f8fafc; font-size: 1rem; font-family: inherit; }
input[type="email"]:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
button { width: 100%; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 16px; }
button:hover:not(:disabled) { background: #2563eb; }
button:disabled { background: #475569; cursor: not-allowed; }
.message { margin-top: 20px; padding: 14px; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; }
.message.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
.message.error { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
.message.hidden { display: none; }
.footer { margin-top: 24px; color: #64748b; font-size: 0.8rem; text-align: center; line-height: 1.5; }
.footer a { color: #60a5fa; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h1><span>The Quarry</span> — Sign In</h1>
  <p class="subtitle">Enter your email and we'll send you a one-click sign-in link. Only authorized team members can access the dashboard.</p>

  <form id="login-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
    <button type="submit" id="submit-btn">Send sign-in link</button>
  </form>

  <div id="message" class="message hidden"></div>

  <div class="footer">
    Trouble signing in? Text Rory.<br>
    Stone Bicycle Coalition · <a href="https://stonebicyclecoalition.com">stonebicyclecoalition.com</a>
  </div>
</div>

<script>
var form = document.getElementById('login-form');
var msgEl = document.getElementById('message');
var btnEl = document.getElementById('submit-btn');

form.addEventListener('submit', function(e) {
  e.preventDefault();
  var email = document.getElementById('email').value.trim();
  if (!email) return;

  btnEl.disabled = true;
  btnEl.textContent = 'Sending…';
  msgEl.classList.add('hidden');

  fetch('/api/auth/request', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ email: email })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(result) {
    if (result.ok) {
      msgEl.className = 'message success';
      msgEl.textContent = result.data.message || 'Check your email for a sign-in link.';
      form.reset();
      btnEl.textContent = 'Sent — check your email';
    } else {
      msgEl.className = 'message error';
      msgEl.textContent = result.data.error || 'Something went wrong. Try again.';
      btnEl.disabled = false;
      btnEl.textContent = 'Send sign-in link';
    }
    msgEl.classList.remove('hidden');
  })
  .catch(function(err) {
    msgEl.className = 'message error';
    msgEl.textContent = 'Network error: ' + err.message;
    msgEl.classList.remove('hidden');
    btnEl.disabled = false;
    btnEl.textContent = 'Send sign-in link';
  });
});
</script>
</body>
</html>
